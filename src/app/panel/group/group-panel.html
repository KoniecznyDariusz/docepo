<div class="group-panel-container h-screen flex flex-col bg-gray-900 text-white">
  <app-header [title]="courseName()"></app-header>

  @if (groupsErrorMessage()) {
    <div class="px-4 pt-3">
      <div class="rounded-md bg-red-900/40 border border-red-700 text-red-100 px-3 py-2 text-sm">
        {{ groupsErrorMessage() }}
      </div>
    </div>
  }

  <app-group-list [groups]="groups()" [groupClassDates]="groupClassDates()" [groupAttendanceEnabled]="groupAttendanceEnabled()"></app-group-list>

  <app-footer></app-footer>
</div>
