<footer class="flex-none py-3 px-4 border-t border-gray-700 bg-gray-800">
  <div class="w-full flex items-center justify-between gap-2">
    @if (showInfoButton()) {
      <button 
        (click)="onInfoClick()"
        class="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded transition-colors">
        {{ 'common.info' | t }}
      </button>
    } @else {
      <div class="w-16"></div>
    }
    <div class="inline-flex rounded-md border border-gray-600 overflow-hidden" role="group" aria-label="Language switch">
      <button
        type="button"
        class="px-2 py-1 text-xs font-semibold transition-colors"
        [class.bg-blue-600]="i18n.currentLanguage() === 'pl'"
        [class.bg-gray-700]="i18n.currentLanguage() !== 'pl'"
        (click)="setLanguage('pl')">
        PL
      </button>
      <button
        type="button"
        class="px-2 py-1 text-xs font-semibold transition-colors"
        [class.bg-blue-600]="i18n.currentLanguage() === 'en'"
        [class.bg-gray-700]="i18n.currentLanguage() !== 'en'"
        (click)="setLanguage('en')">
        EN
      </button>
    </div>
    <app-back-button [backUrl]="backUrl()"></app-back-button>
  </div>
</footer>
